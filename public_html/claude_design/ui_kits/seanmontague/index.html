<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sean Montague · UI Kit</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="kit.css">
  <style>
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
    body { font-family: var(--font-serif); }
    * { box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Nav.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="MapSection.jsx"></script>
  <script type="text/babel" src="Content.jsx"></script>
  <script type="text/babel" src="Article.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [view, setView] = useState(() => localStorage.getItem('sm-view') || 'home');
      useEffect(() => {
        localStorage.setItem('sm-view', view);
        window.scrollTo({ top: 0, behavior: 'instant' });
      }, [view]);

      if (view === 'article') {
        return (
          <>
            <Nav mode="article" go={setView} />
            <ArticleView onBack={() => setView('home')} />
            <Footer />
          </>
        );
      }

      return (
        <>
          <Nav mode="home" go={setView} current="maps" />
          <Hero onExplore={() => { const el = document.getElementById('maps'); if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' }); }}
                onRead={() => { const el = document.getElementById('writing'); if (el) window.scrollTo({ top: el.offsetTop - 60, behavior: 'smooth' }); }} />
          <Marquee />
          <MapSection />
          <ArticleGrid onOpenArticle={() => setView('article')} />
          <PlaceGrid />
          <AboutSection />
          <ContactSection />
          <Footer />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
