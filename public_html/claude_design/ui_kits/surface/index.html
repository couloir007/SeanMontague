<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Surface · Pattern Library</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="stylesheet" href="surface.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font-serif); }
    #root { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

    /* Sidebar */
    .sidebar { background: var(--bright); color: rgba(255,255,255,0.75); padding: 28px 0; border-right: 1px solid var(--border); position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .sidebar-head { padding: 0 24px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 20px; }
    .sidebar-brand { font-family: var(--font-display-nek); font-size: 28px; letter-spacing: 0.06em; color: #fff; line-height: 1; }
    .sidebar-sub { font-family: var(--font-mono-nek); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-top: 8px; }
    .sidebar-nav { padding: 0 24px; }
    .sidebar-group { margin-bottom: 22px; }
    .sidebar-group-label { font-family: var(--font-mono-nek); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--forest); margin-bottom: 10px; }
    .sidebar-group-label.is-active { color: #fff; }
    .sidebar-items { list-style: none; margin: 0; padding: 0; }
    .sidebar-item { font-family: var(--font-mono-nek); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.45); padding: 5px 0; }

    /* Main */
    .main { background: var(--bg); padding: 40px 56px 60px; }
    .main-head { display: flex; justify-content: space-between; align-items: flex-end; padding-bottom: 28px; margin-bottom: 36px; border-bottom: 1px solid var(--border); gap: 40px; }
    .main-kicker { font-family: var(--font-mono-nek); font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--forest); margin-bottom: 10px; }
    .main-title { font-family: var(--font-display-nek); font-size: 88px; font-weight: 400; letter-spacing: 0.02em; line-height: 0.9; color: var(--bright); margin: 0; }
    .main-sub { font-family: var(--font-serif-nek); font-size: 20px; font-style: italic; font-weight: 300; color: var(--muted); line-height: 1.5; margin: 16px 0 0; max-width: 620px; }
    .main-tabs { display: flex; gap: 0; border: 1px solid var(--border); }
    .tab { background: var(--surface); border: none; border-right: 1px solid var(--border); padding: 10px 18px; font-family: var(--font-mono-nek); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: background .2s, color .2s; }
    .tab:last-child { border-right: none; }
    .tab:hover { color: var(--bright); }
    .tab.active { background: var(--forest); color: #fff; }

    /* Section */
    .section { margin-bottom: 40px; }
    .section-label { font-family: var(--font-mono-nek); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--trail); margin-bottom: 22px; border-left: 3px solid var(--trail); padding-left: 12px; }

    .spec { background: var(--surface); border: 1px solid var(--border); margin-bottom: 22px; }
    .spec-head { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .spec-title { font-family: var(--font-mono-nek); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--bright); margin: 0; }
    .spec-meta  { font-family: var(--font-mono-nek); font-size: 9px; letter-spacing: 0.14em; color: var(--muted); }
    .spec-stage { padding: 28px; background: var(--bg); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="specimens.jsx"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
