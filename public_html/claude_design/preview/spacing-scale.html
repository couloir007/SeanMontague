<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:22px 24px; background:var(--bg); }
.tag { font-family:var(--font-mono); font-size:9px; letter-spacing:0.28em; color:var(--muted); text-transform:uppercase; margin-bottom:16px; }
.ex { display:flex; flex-direction:column; gap:10px; }
.row { display:flex; align-items:center; gap:14px; }
.tok { font-family:var(--font-mono); font-size:9px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; min-width:70px; }
.bar { height:14px; background:var(--forest); opacity:0.8; }
.b-4  { width:4px; } .b-8 { width:8px; } .b-12 { width:12px; } .b-16 { width:16px; } .b-24 { width:24px; } .b-32 { width:32px; } .b-48 { width:48px; } .b-80 { width:80px; }
</style></head><body>
<div class="tag">Spacing scale · 4px base</div>
<div class="ex">
  <div class="row"><span class="tok">4</span><div class="bar b-4"></div></div>
  <div class="row"><span class="tok">8</span><div class="bar b-8"></div></div>
  <div class="row"><span class="tok">12</span><div class="bar b-12"></div></div>
  <div class="row"><span class="tok">16</span><div class="bar b-16"></div></div>
  <div class="row"><span class="tok">24</span><div class="bar b-24"></div></div>
  <div class="row"><span class="tok">32</span><div class="bar b-32"></div></div>
  <div class="row"><span class="tok">48</span><div class="bar b-48"></div></div>
  <div class="row"><span class="tok">80</span><div class="bar b-80"></div></div>
</div>
</body></html>
