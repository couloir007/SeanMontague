<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:22px 24px; background:var(--bg); }
.row { display:grid; grid-template-columns: repeat(4, 1fr); gap: 0; border:1px solid var(--border); background:var(--surface); }
.sw { padding:16px 14px; border-right:1px solid var(--border); display:flex; flex-direction:column; gap:8px; }
.sw:last-child { border-right:none; }
.chip { height:64px; border:1px solid var(--border); }
.n { font-family:var(--font-mono); font-size:9px; letter-spacing:0.22em; text-transform:uppercase; color:var(--bright); }
.v { font-family:var(--font-mono); font-size:9px; letter-spacing:0.08em; color:var(--muted); }
.role { font-family:var(--font-serif); font-size:13px; font-style:italic; color:var(--muted); line-height:1.3; }
.group { font-family:var(--font-mono); font-size:9px; letter-spacing:0.3em; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
</style></head><body>
<div class="group">Subject accents — one per content pillar</div>
<div class="row">
  <div class="sw"><div class="chip" style="background:#3a5a40"></div><div class="n">FOREST</div><div class="v">#3a5a40</div><div class="role">Primary accent. Hover rail, links, permaculture.</div></div>
  <div class="sw"><div class="chip" style="background:#7a3410"></div><div class="n">TRAIL</div><div class="v">#7a3410</div><div class="role">MTB, skiing, Kingdom Trails.</div></div>
  <div class="sw"><div class="chip" style="background:#4a7c9e"></div><div class="n">SKY</div><div class="v">#4a7c9e</div><div class="role">Maps, Leaflet, technical.</div></div>
  <div class="sw"><div class="chip" style="background:#6b6560"></div><div class="n">STONE</div><div class="v">#6b6560</div><div class="role">Neutral tag tint.</div></div>
</div>
</body></html>
