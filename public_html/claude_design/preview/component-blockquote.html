<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:22px 26px; background:var(--bg); color:var(--text); font-family:var(--font-serif); font-size:17px; font-weight:300; line-height:1.75; }
blockquote { border-left:3px solid var(--forest); padding:10px 20px; margin:0; background:rgba(58,90,64,0.04); }
blockquote p { font-family:var(--font-serif); font-size:20px; font-style:italic; color:var(--bright); font-weight:300; margin:0 0 8px; line-height:1.5; }
blockquote cite { font-family:var(--font-mono); font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); font-style:normal; }
</style></head><body>
<blockquote>
  <p>Burke doesn't have the terrain of Stowe, but it has something better — solitude, character, and a vertical that earns it.</p>
  <cite>— Sean Montague, <em style="font-family:var(--font-serif);">A Season of Skiing Burke</em></cite>
</blockquote>
</body></html>
