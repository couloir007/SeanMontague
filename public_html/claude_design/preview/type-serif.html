<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:22px 24px; background:var(--bg); }
.tag { font-family:var(--font-mono); font-size:9px; letter-spacing:0.28em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
h2 { font-family:var(--font-serif); font-weight:300; font-size:34px; color:var(--bright); line-height:1.15; margin:0 0 10px; }
h2 em { font-style:italic; color:var(--forest); }
p { font-family:var(--font-serif); font-weight:300; font-size:17px; line-height:1.75; color:var(--text); margin:0 0 6px; }
.meta { font-family:var(--font-mono); font-size:9px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; display:flex; gap:18px; margin-top:6px; }
</style></head><body>
<div class="tag">Serif · Cormorant Garamond</div>
<h2>The Kingdom, <em>mapped.</em></h2>
<p>Custom Leaflet maps of the places I know best — Kingdom Trails singletrack, Burke Mountain terrain, and the land around Burke.</p>
<div class="meta"><span>300 / 400</span><span>ITAL ACCENT</span><span>1.75 / LH</span></div>
</body></html>
