<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:24px; background:var(--bg); }
.specimen { display:flex; flex-direction:column; gap:8px; }
.tag { font-family:var(--font-mono); font-size:9px; letter-spacing:0.28em; color:var(--muted); text-transform:uppercase; }
.big { font-family:var(--font-display); font-size:88px; line-height:0.9; letter-spacing:0.02em; color:var(--bright); text-transform:uppercase; }
.meta { font-family:var(--font-mono); font-size:9px; letter-spacing:0.15em; color:var(--muted); text-transform:uppercase; display:flex; gap:18px; }
</style></head><body>
<div class="specimen">
  <div class="tag">Display · Bebas Neue</div>
  <div class="big">NORTHEAST KINGDOM</div>
  <div class="meta"><span>400</span><span>0.02em</span><span>0.9 / LH</span><span>ALL CAPS</span></div>
</div>
</body></html>
