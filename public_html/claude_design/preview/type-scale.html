<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:24px; background:var(--bg); }
.row { display:grid; grid-template-columns:110px 1fr; gap:14px 20px; align-items:baseline; }
.tok { font-family:var(--font-mono); font-size:9px; letter-spacing:0.18em; color:var(--muted); text-transform:uppercase; }
.s1 { font-family:var(--font-display); font-size:72px; line-height:0.9; letter-spacing:0.02em; color:var(--bright); }
.s2 { font-family:var(--font-serif); font-size:32px; line-height:1.15; font-weight:400; color:var(--bright); }
.s3 { font-family:var(--font-serif); font-size:24px; font-weight:400; color:var(--bright); }
.s4 { font-family:var(--font-serif); font-size:19px; font-weight:300; line-height:1.8; color:var(--text); }
.s5 { font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; color:var(--muted); text-transform:uppercase; }
</style></head><body>
<div class="row">
  <div class="tok">H1 / 80PX</div><div class="s1">BURKE VT</div>
  <div class="tok">H2 / 32PX</div><div class="s2">A season of skiing Burke.</div>
  <div class="tok">H3 / 24PX</div><div class="s3">Year three of the food forest.</div>
  <div class="tok">BODY / 19PX</div><div class="s4">Kingdom Trails has 100+ miles but most visitors ride the same ten.</div>
  <div class="tok">LABEL / 10PX</div><div class="s5">March 2025 · 8 min read</div>
</div>
</body></html>
