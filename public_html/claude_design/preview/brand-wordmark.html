<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:28px; background:var(--bg); }
.wrap { display:flex; flex-direction:column; gap:18px; }
.line { font-family:var(--font-mono); color:var(--bright); }
.lg { font-size:28px; letter-spacing:0.08em; }
.md { font-size:14px; letter-spacing:0.08em; }
.sm { font-size:11px; letter-spacing:0.1em; color:var(--muted); }
.line span.accent { color:var(--forest); }
</style></head><body>
<div class="wrap">
  <div class="line lg">Sean Montague <span class="accent">/ Burke, VT</span></div>
  <div class="line md">Sean Montague <span class="accent">/ Burke, VT</span></div>
  <div class="line sm">SEAN MONTAGUE <span class="accent" style="color:var(--forest);">· BURKE, VT · NEK</span></div>
</div>
</body></html>
