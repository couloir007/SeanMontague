<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:24px; background:var(--bg); }
.tag { font-family:var(--font-mono); font-size:9px; letter-spacing:0.28em; color:var(--muted); text-transform:uppercase; margin-bottom:14px; }
.row { display:flex; flex-direction:column; gap:14px; }
.line { font-family:var(--font-mono); color:var(--bright); text-transform:uppercase; }
.l1 { font-size:12px; letter-spacing:0.08em; }
.l1 span { color:var(--forest); }
.l2 { font-size:10px; letter-spacing:0.18em; color:var(--muted); }
.l3 { font-size:9px; letter-spacing:0.25em; color:var(--muted); }
.l4 { font-size:10px; letter-spacing:0.3em; color:var(--forest); }
.meta { font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; display:flex; gap:14px; margin-top:4px; flex-wrap:wrap; }
</style></head><body>
<div class="tag">Mono · DM Mono</div>
<div class="row">
  <div class="line l1">Sean Montague <span>/ Burke, VT</span></div>
  <div class="line l2">Maps &nbsp; Writing &nbsp; Places &nbsp; About</div>
  <div class="line l3">March 2025 · 8 min read</div>
  <div class="line l4">Burke, Vermont · Northeast Kingdom</div>
</div>
<div class="meta"><span>300/400</span><span>0.08 WORDMARK</span><span>0.18 NAV/BTN</span><span>0.25 LABEL</span><span>0.30 EYEBROW</span></div>
</body></html>
