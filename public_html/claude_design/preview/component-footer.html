<!DOCTYPE html><html><head><meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin:0; padding:0; background:var(--bright); }
footer { display:flex; justify-content:space-between; align-items:center; padding:22px 28px; background:var(--bright); }
.brand { font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em; color:rgba(255,255,255,0.3); }

.links a { font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.3); text-decoration:none; transition: color .2s; }
.links a:hover { color:rgba(255,255,255,0.7); }

<footer>
  <div class="brand">Sean Montague · Burke, VT</div>
