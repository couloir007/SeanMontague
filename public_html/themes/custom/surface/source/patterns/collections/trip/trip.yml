narrative_kicker: 'Trip Notes'
narrative_heading: 'Ten days, the full perimeter, and a lot of stone walls'
body: |
  <p>Ireland in April is not the Ireland of summer tourism brochures. The light is low and specific — that particular Atlantic silver that makes the countryside look like it has been painted on a damp morning. We landed in Dublin on the 19th, collected the car, and drove north before the day was out.</p>
  <p>The plan was loose: north to Sligo for Yeats country and the coast, then down through Galway, out to Inishmore on the Aran Islands, and a long southern loop through Limerick, Killarney, and the Dingle Peninsula before ending in Kilkenny.</p>
  <blockquote>
    <p>"There is no such thing as bad weather in Ireland, only different kinds of good light."</p>
    <cite>— overheard, a pub in Sligo</cite>
  </blockquote>
  <p>What you don't plan for is the pace of it. Ireland resists the itinerary. A conversation at a petrol station turns into a detour to a ring fort. A wrong turn on the Dingle Peninsula leads to a beach with no name on any sign.</p>
  <hr>
  <h3>The West</h3>
  <p>Galway is the easiest place in Ireland to spend more time than you intended. The Aran Islands day — ferry from Rossaveal to Inishmore — was one of those travel days that earns its place in the permanent record. Rented bicycles at the pier, rode out to Dún Aonghasa in actual April sunshine, sat on the cliff edge for longer than was sensible.</p>

