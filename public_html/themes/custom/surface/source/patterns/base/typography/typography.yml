fonts:
  Display (Bebas Neue):
    - family: 'Bebas Neue'
      style: 'normal'
      weight: '400'
      tag: 'h1'
      size: 'clamp(64px, 9vw, 120px)'
      leading: '0.9'
      tracking: '0.02em'
      transform: 'uppercase'
      case: 'All caps'
      var: '--font-display-nek'

  Serif Heading (Cormorant Garamond):
    - family: 'Cormorant Garamond'
      style: 'normal'
      weight: '300'
      tag: 'h2'
      size: 'clamp(28px, 3.5vw, 48px)'
      leading: '1.15'
      tracking: '0'
      transform: 'none'
      case: 'Sentence case'
      var: '--font-serif-nek'

  Serif Body:
    - family: 'Cormorant Garamond'
      style: 'normal'
      weight: '300'
      tag: 'p'
      size: '18px'
      leading: '1.75'
      tracking: '0'
      transform: 'none'
      case: 'Sentence case'
      var: '--font-serif-nek'

  Mono Label (DM Mono):
    - family: 'DM Mono'
      style: 'normal'
      weight: '400'
      tag: 'span'
      size: '10px'
      leading: '1.4'
      tracking: '0.2em'
      transform: 'uppercase'
      case: 'All caps'
      var: '--font-mono-nek'
