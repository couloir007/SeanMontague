fonts:
  - name: 'Bebas Neue'
    var: '--font-display-nek'
    usage: 'Hero titles, section headlines, stats values'
    import: "https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"

  - name: 'Cormorant Garamond'
    var: '--font-serif-nek'
    usage: 'Body text, article headings, italic accents, subtitles'
    import: "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap"

  - name: 'DM Mono'
    var: '--font-mono-nek'
    usage: 'Labels, navigation, metadata, category tags, stat labels'
    import: "https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap"
