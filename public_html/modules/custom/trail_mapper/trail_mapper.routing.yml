trail_mapper.generate_geojson:
  path: '/trail-mapper/generate-geojson'
  defaults:
    _controller: '\Drupal\trail_mapper\Controller\GeoJsonController::generate'
    _title: 'Generate GeoJSON'
  requirements:
    _permission: 'access content'

trail_mapper.settings:
  path: '/admin/config/trail-mapper'
  defaults:
    _form: '\Drupal\trail_mapper\Form\TrailMapperSettingsForm'
    _title: 'Trail Mapper Settings'
  requirements:
    _permission: 'administer site configuration'
