leaflet_full_page.map_items:
  path: '/leaflet-full-page/map-items/{bundle}'
  defaults:
    _controller: '\Drupal\leaflet_full_page\Controller\MapItemsController::dump'
  requirements:
    _permission: 'access content'

leaflet_full_page.map_items_default:
  path: '/leaflet-full-page/map-items'
  defaults:
    _controller: '\Drupal\leaflet_full_page\Controller\MapItemsController::dump'
    bundle: ''
  requirements:
    _permission: 'access content'

leaflet_full_page.settings:
  path: '/admin/config/leaflet-full-page/settings'
  defaults:
    _form: '\Drupal\leaflet_full_page\Form\SettingsForm'
    _title: 'Leaflet Full Page Settings'
  requirements:
    _permission: 'administer site configuration'
  options:
    _admin_route: TRUE
