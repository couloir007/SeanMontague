gvp_external_resource.settings:
  path: '/admin/structure/gvp_external_resource/settings'
  defaults:
    _form: '\Drupal\gvp_external_resources\Form\ExternalResourceSettingsForm'
    _title: 'External Resource Settings'
  requirements:
    _permission: 'administer external resource entities'

external_resource_endpoint.settings:
  path: '/admin/structure/external_resource_endpoint/settings'
  defaults:
    _form: '\Drupal\gvp_external_resources\Form\ExternalResourceSettingsForm'
    _title: 'External Resource Endpoint Settings'
  requirements:
    _permission: 'administer external resource endpoint entities'

volcano_external_resource.settings:
  path: '/admin/structure/volcano_external_resource/settings'
  defaults:
    _form: '\Drupal\gvp_external_resources\Form\ExternalResourceSettingsForm'
    _title: 'Volcano External Resource Settings'
  requirements:
    _permission: 'administer volcano external resource entities'
