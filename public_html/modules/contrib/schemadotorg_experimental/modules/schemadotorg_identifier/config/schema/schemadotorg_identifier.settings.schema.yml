schemadotorg_identifier.settings:
  type: config_object
  label: 'Schema.org Identifier settings'
  mapping:
    field_definitions:
      type: sequence
      label: 'Field definitions'
      sequence:
        type: mapping
        label: 'Field definitions'
        mapping:
          property_id:
            type: string
            label: 'Property ID'
          field_name:
            type: string
            label: 'Field name'
          type:
            type: string
            label: 'Field type'
          label:
            type: string
            label: Label
          description:
            type: string
            label: Description
          required:
            type: boolean
            label: Required
          max_length:
            type: integer
            label: 'Maximum length'
          field_storage_settings:
            type: ignore
            label: 'Field storage settings'
          field_settings:
            type: ignore
            label: 'Field settings'
          widget_id:
            type: string
            label: 'Widget ID'
          widget_settings:
            type: ignore
            label: 'Widget settings'
          formatter_id:
            type: string
            label: 'Formatter ID'
          formatter_settings:
            type: ignore
            label: 'Formatter settings'
    schema_types:
      type: sequence
      label: 'Schema.org types'
      sequence:
        type: sequence
        label: 'Schema.org type'
        sequence:
          type: string
          label: 'Identifier field'
